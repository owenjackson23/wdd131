<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WDD131 | Country Page: Disney World</title>
    <meta name="Author" content="Owen Jackson">
    <link rel="stylesheet" href="styles/place.css">
    <script src="scripts/place.js" defer></script>

</head>

<body>
    <header>
        <h1>Disney World</h1>
    </header>
    <main>
        <div class="hero-wrapper">
            <picture class="hero">
                <source srcset="images/walt-disney-world.webp" media="(min-width: 615px)">
                <img src="images/cinderella-castle.webp" alt="Cinderella Castle - Disney World" width="200">
            </picture>
            <section class="data">
                <h2>Data</h2>
                <ul>
                    <li>Area: -1</li>
                    <li>Population: -1</li>
                    <li>Capital: Value</li>
                    <li>Languages: Value</li>
                    <li>Currency: Value</li>
                    <li>Time Zone: Value</li>
                    <li>Calling Code: Value</li>
                    <li>Internet TLD: Value</li>
                </ul>
            </section>
            <section class="weather">
                <h2>Weather</h2>
                <img src="images/weather-icon.svg" alt="Weather Icon" width="200">
                <ul>
                    <li>Temperature: <span id="temperature"></span>°F</li>
                    <li>Conditions: <span id="conditions"></span></li>
                    <li>Wind: <span id="wind"></span>mph</li>
                    <li>Wind Chill: <span id="windChill"></span>°F</li>
                </ul>
            </section>
        </div>
    </main>
    <footer>
        <p>
            ©<span id="currentyear"></span> - Owen Jackson - Disney World
        </p>
        <p id="lastModified"></p>
    </footer>


</body>

</html>
