<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Souvenirs | Galaxy's Edge Guidebook</title>
    <meta name="description"
        content="This page provides information about the souvenirs available at Disney's Galaxy's Edge and has a form to sign up for custom souvenir experiences">
    <meta name="author" content="Owen Jackson">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400..900&family=Zen+Kaku+Gothic+New&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles/project.css">
    <script src="scripts/date-time.js" defer></script>
    <script src="scripts/project.js" defer></script>
</head>

<body>
    <header>
        <h2>Galaxy's Edge Guidebook</h2>
        <nav>
            <ul class="navigation">
                <li><a id="home" href="index.html">Home</a></li>
                <li><a id="rides" href="rides.html">Rides</a></li>
                <li><a id="souvenirs" href="#">Souvenirs</a></li>
                <li><a id="food" href="food.html">Food</a></li>
            </ul>
        </nav>
        <a id="menu" href="#" aria-label="Open navigation menu"></a>
    </header>

    <main>
        <h1>Souvenirs</h1>
        <div class="souvCards"></div>

        <form id="reservationForm" action="reservation.html" method="get">
            <h2>Custom Souvenir Experience</h2>
            <div class="participant">
                <label for="name">*Participant's Name:</label>
                <input type="text" id="name" name="name" required>
            </div>

            <div class="select-experience">
                <label for="experience">*Souvenir Experience:</label>
                <select id="experience" name="experience" required>
                    <option value="" disabled selected>Select an experience</option>

                </select>
            </div>

            <div class="date">
                <label for="reserveDate">*Reserve a Date:</label>
                <input type="date" id="reserveDate" name="reserveDate" required>
            </div>

            <fieldset>
                <legend>*Reserve a Time</legend>
                <div class="times">
                    <div class="time">
                        <input type="radio" id="time1" name="time" value="1" required>
                        <label for="time1">11:00 AM</label>
                    </div>
                    <div class="time">
                        <input type="radio" id="time2" name="time" value="2" required>
                        <label for="time2">11:30 AM</label>
                    </div>

                    <div class="time">
                        <input type="radio" id="time3" name="time" value="3" required>
                        <label for="time3">12:30 PM</label>
                    </div>

                    <div class="time">
                        <input type="radio" id="time4" name="time" value="4" required>
                        <label for="time4">1:00 PM</label>
                    </div>

                    <div class="time">
                        <input type="radio" id="time5" name="time" value="5" required>
                        <label for="time5">1:30 PM</label>
                    </div>

                    <div class="time">
                        <input type="radio" id="time6" name="time" value="6" required>
                        <label for="time6">2:00 PM</label>
                    </div>
                </div>
            </fieldset>

            <div class="notes">
                <label for="notes">Additional Comments:</label>
                <textarea id="notes" name="notes" placeholder="Type any additional notes here."></textarea>
            </div>

            <button type="submit">Finish Reservation</button>
        </form>
    </main>

    <footer>
        <div>
            <p>
                &copy;<span id="currentYear"></span> Owen Jackson, Arizona, USA
            </p>
            <p id="lastModified"></p>
        </div>
    </footer>

</body>

</html>
